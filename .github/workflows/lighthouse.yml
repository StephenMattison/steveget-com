name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (non-blocking baseline)
        run: |
          set +e
          lhci autorun
          status=$?
          if [ $status -ne 0 ]; then
            echo "Lighthouse reported issues (non-blocking baseline mode)."
            echo "Review the report URLs in this log for exact fixes."
          fi
          exit 0
