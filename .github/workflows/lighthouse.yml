name: Lighthouse CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 1 * *'

permissions:
  contents: read
  statuses: write
  checks: write
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (non-blocking baseline)
        env:
          LHCI_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          ./scripts/run-lhci.sh
          status=$?
          if [ $status -ne 0 ]; then
            echo "Lighthouse reported issues (non-blocking baseline mode)."
            echo "Review the report URLs and GitHub status checks for exact fixes."
          fi
          exit 0